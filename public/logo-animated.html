<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo — Swish Animation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0e0c14;
      font-family: system-ui, sans-serif;
    }

    /* ── Container ── */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ── Logo wrapper — idle float ── */
    .logo-wrap {
      width: 160px;
      height: 160px;
      position: relative;
      cursor: pointer;
      animation: float 4s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      filter: drop-shadow(0 12px 40px rgba(255, 121, 23, 0.25));
      transition: filter 0.3s ease;
    }
    .logo-wrap:hover {
      filter: drop-shadow(0 16px 56px rgba(255, 121, 23, 0.55));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* ── Each path as its own animated layer ── */
    .logo-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Shared entrance base */
    #var, #monovar, #monovar_2, #orange {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* Staggered swish-in from different directions */
    #var       { animation: swish-from-left   0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both; }
    #monovar   { animation: swish-from-bottom 0.6s cubic-bezier(0.22,1,0.36,1) 0.25s both; }
    #monovar_2 { animation: swish-from-right  0.6s cubic-bezier(0.22,1,0.36,1) 0.4s both; }
    #orange    { animation: swish-pop         0.7s cubic-bezier(0.22,1,0.36,1) 0.55s both; }

    @keyframes swish-from-left {
      from { opacity: 0; transform: translateX(-30px) rotate(-15deg) scale(0.7); }
      to   { opacity: 1; transform: translateX(0)      rotate(0deg)  scale(1); }
    }
    @keyframes swish-from-bottom {
      from { opacity: 0; transform: translateY(30px)  rotate(15deg)  scale(0.7); }
      to   { opacity: 1; transform: translateY(0)     rotate(0deg)   scale(1); }
    }
    @keyframes swish-from-right {
      from { opacity: 0; transform: translateX(30px) rotate(15deg)  scale(0.7); }
      to   { opacity: 1; transform: translateX(0)    rotate(0deg)   scale(1); }
    }
    @keyframes swish-pop {
      from { opacity: 0; transform: scale(0) rotate(-20deg); }
      60%  { transform: scale(1.15) rotate(4deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* ── Hover — each part swishes outward then snaps back ── */
    .logo-wrap:hover #var       { animation: hover-left   0.45s cubic-bezier(0.22,1,0.36,1) both; }
    .logo-wrap:hover #monovar   { animation: hover-bottom 0.45s cubic-bezier(0.22,1,0.36,1) 0.04s both; }
    .logo-wrap:hover #monovar_2 { animation: hover-right  0.45s cubic-bezier(0.22,1,0.36,1) 0.08s both; }
    .logo-wrap:hover #orange    { animation: hover-spin   0.5s  cubic-bezier(0.22,1,0.36,1) 0.0s  both; }

    @keyframes hover-left {
      0%   { transform: translate(0,0) rotate(0deg); }
      40%  { transform: translate(-8px,-4px) rotate(-8deg) scale(1.08); }
      100% { transform: translate(0,0) rotate(0deg) scale(1); }
    }
    @keyframes hover-bottom {
      0%   { transform: translate(0,0) rotate(0deg); }
      40%  { transform: translate(-4px, 8px) rotate(8deg) scale(1.08); }
      100% { transform: translate(0,0) rotate(0deg) scale(1); }
    }
    @keyframes hover-right {
      0%   { transform: translate(0,0) rotate(0deg); }
      40%  { transform: translate(8px, 8px) rotate(8deg) scale(1.08); }
      100% { transform: translate(0,0) rotate(0deg) scale(1); }
    }
    @keyframes hover-spin {
      0%   { transform: scale(1)    rotate(0deg); }
      40%  { transform: scale(1.15) rotate(15deg); }
      100% { transform: scale(1)    rotate(0deg); }
    }

    /* ── Label ── */
    .label {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fade-up 0.5s ease 0.9s both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Replay button ── */
    .replay {
      margin-top: 16px;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      animation: fade-up 0.4s ease 1.1s both;
    }
    .replay:hover { border-color: #FF7917; color: #FF7917; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      #var, #monovar, #monovar_2, #orange,
      .logo-wrap, .label, .replay {
        animation: none !important;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="logo-wrap" id="logoWrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 49 48" fill="none">
        <g id="var">
          <path d="M2.98438 29.2901C2.98438 27.0301 3.4295 24.7921 4.2944 22.7042C5.15932 20.6161 6.42698 18.7189 8.02509 17.1208C9.62321 15.5227 11.5204 14.255 13.6084 13.3901C15.6965 12.5253 17.9344 12.0801 20.1945 12.0801V29.2901H2.98438Z" fill="#442781"/>
        </g>
        <g id="monovar">
          <path d="M2.98438 29.29C2.98438 31.5501 3.4295 33.788 4.2944 35.8761C5.15932 37.9641 6.42698 39.8613 8.02509 41.4594C9.62321 43.0575 11.5204 44.3252 13.6084 45.1901C15.6965 46.055 17.9344 46.5001 20.1945 46.5001V29.29H2.98438Z" fill="#61459C"/>
        </g>
        <g id="monovar_2">
          <path d="M37.4051 29.29C37.4051 31.5501 36.9603 33.788 36.0955 35.8761C35.2306 37.9641 33.963 39.8613 32.3646 41.4594C30.7665 43.0575 28.8693 44.3252 26.7812 45.1901C24.6933 46.055 22.4553 46.5001 20.1953 46.5001V29.29H37.4051Z" fill="#A992DB"/>
        </g>
        <g id="orange">
          <path d="M48.0159 14.422C48.0159 21.5586 42.2303 27.344 35.0938 27.344H22.1719V14.422C22.1719 7.2854 27.9573 1.5 35.0938 1.5C42.2303 1.5 48.0159 7.2854 48.0159 14.422Z" fill="#FF7917"/>
        </g>
      </svg>
    </div>

    <p class="label">Hover to swish · Click to replay</p>
    <button class="replay" id="replayBtn">↺ Replay entrance</button>
  </div>

  <script>
    const wrap = document.getElementById('logoWrap');
    const btn  = document.getElementById('replayBtn');
    const parts = ['#var','#monovar','#monovar_2','#orange'];

    const durations = { '#var': 100, '#monovar': 250, '#monovar_2': 400, '#orange': 550 };
    const enterAnimations = {
      '#var':       'swish-from-left   0.6s cubic-bezier(0.22,1,0.36,1) 0.1s  both',
      '#monovar':   'swish-from-bottom 0.6s cubic-bezier(0.22,1,0.36,1) 0.25s both',
      '#monovar_2': 'swish-from-right  0.6s cubic-bezier(0.22,1,0.36,1) 0.4s  both',
      '#orange':    'swish-pop         0.7s cubic-bezier(0.22,1,0.36,1) 0.55s both',
    };

    btn.addEventListener('click', () => {
      parts.forEach(sel => {
        const el = wrap.querySelector(sel);
        el.style.animation = 'none';
        el.offsetWidth; // reflow
        el.style.animation = enterAnimations[sel];
      });
    });
  </script>
</body>
</html>
